# ============================================================
# Smart Health Platform — 微服务模式 Docker Compose
# 启动前先在主机上执行:
#   mvn clean package -DskipTests
#   cd smart-health-frontend && npm ci && npm run build
# ============================================================
services:

  # ============================================================
  # 基础设施
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: smart-health-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: smart_health
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - smart-health-net

  redis:
    image: redis:7-alpine
    container_name: smart-health-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - smart-health-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smart-health-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - smart-health-net

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: smart-health-es
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD:?ES_PASSWORD is required}
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - smart-health-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: smart-health-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=["http://elasticsearch:9200"]
      - ES_PASSWORD=${ES_PASSWORD:?ES_PASSWORD is required}
    command: >
      sh -c "set -e;
             if [ ! -f /usr/share/kibana/data/kibana-token ]; then
               echo 'Waiting for Elasticsearch...';
               until curl -s -u elastic:$${ES_PASSWORD} http://elasticsearch:9200/_cluster/health >/dev/null 2>&1; do sleep 2; done;
               echo 'Creating Kibana service account token...';
               curl -s -X POST -u elastic:$${ES_PASSWORD} http://elasticsearch:9200/_security/service/elastic/kibana/credential/token/kibana-token > /tmp/token.json;
               sed -n 's/.*\"value\":\"\\([^\"]*\\)\".*/\\1/p' /tmp/token.json > /usr/share/kibana/data/kibana-token;
             fi;
             export ELASTICSEARCH_SERVICEACCOUNTTOKEN=$$(cat /usr/share/kibana/data/kibana-token);
             echo 'Starting Kibana...';
             exec /usr/local/bin/kibana-docker"
    volumes:
      - kibana-token-data:/usr/share/kibana/data
    depends_on:
      - elasticsearch
    networks:
      - smart-health-net

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: smart-health-filebeat
    restart: unless-stopped
    user: root
    command: >
      sh -c "filebeat setup -e -strict.perms=false || true;
             exec filebeat -e -strict.perms=false"
    environment:
      - ES_PASSWORD=${ES_PASSWORD:?ES_PASSWORD is required}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - app-logs:/app/logs:ro
    depends_on:
      - elasticsearch
      - kibana
    networks:
      - smart-health-net

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: smart-health-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
    networks:
      - smart-health-net

  # ============================================================
  # 后端微服务
  # ============================================================
  user-service:
    build:
      context: .
      dockerfile: smart-health-user/Dockerfile
    container_name: smart-health-user
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SMS_PROVIDER: ${SMS_PROVIDER:?SMS_PROVIDER must be set (dypnsapi or mock)}
      SMS_DYPNSAPI_ACCESS_KEY_ID: ${SMS_DYPNSAPI_ACCESS_KEY_ID:-}
      SMS_DYPNSAPI_ACCESS_KEY_SECRET: ${SMS_DYPNSAPI_ACCESS_KEY_SECRET:-}
      SMS_DYPNSAPI_TEMPLATE_CODE: ${SMS_DYPNSAPI_TEMPLATE_CODE:-}
      SMS_DYPNSAPI_ENDPOINT: ${SMS_DYPNSAPI_ENDPOINT:-dypnsapi.aliyuncs.com}
      SMS_DYPNSAPI_SIGN_NAME: ${SMS_DYPNSAPI_SIGN_NAME:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      LOG_FILE: /app/logs/smart-health-user/app.log
    depends_on:
      - mysql
      - redis
      - nacos
    networks:
      - smart-health-net
    volumes:
      - app-logs:/app/logs

  registration-service:
    build:
      context: .
      dockerfile: smart-health-registration/Dockerfile
    container_name: smart-health-registration
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      NACOS_SERVER_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LOG_FILE: /app/logs/smart-health-registration/app.log
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos
    networks:
      - smart-health-net
    volumes:
      - app-logs:/app/logs

  consultation-service:
    build:
      context: .
      dockerfile: smart-health-consultation/Dockerfile
    container_name: smart-health-consultation
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_ELASTICSEARCH_USERNAME: elastic
      SPRING_ELASTICSEARCH_PASSWORD: ${ES_PASSWORD:?ES_PASSWORD is required}
      NACOS_SERVER_ADDR: nacos:8848
      AI_API_KEY: ${AI_API_KEY}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      UPLOAD_PATH: /app/uploads
      LOG_FILE: /app/logs/smart-health-consultation/app.log
    volumes:
      - consultation-uploads:/app/uploads
      - app-logs:/app/logs
    depends_on:
      - mysql
      - redis
      - elasticsearch
      - nacos
    networks:
      - smart-health-net

  prescription-service:
    build:
      context: .
      dockerfile: smart-health-prescription/Dockerfile
    container_name: smart-health-prescription
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      UPLOAD_PATH: /app/uploads
      LOG_FILE: /app/logs/smart-health-prescription/app.log
    volumes:
      - prescription-uploads:/app/uploads
      - app-logs:/app/logs
    depends_on:
      - mysql
      - redis
      - nacos
    networks:
      - smart-health-net

  # ============================================================
  # API 网关
  # ============================================================
  gateway:
    build:
      context: .
      dockerfile: smart-gateway/Dockerfile
    container_name: smart-health-gateway
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LOG_FILE: /app/logs/smart-gateway/app.log
    depends_on:
      - user-service
      - registration-service
      - consultation-service
      - prescription-service
      - nacos
    networks:
      - smart-health-net
    volumes:
      - app-logs:/app/logs

  # ============================================================
  # 聚合服务（首页统计等）
  # ============================================================
  app-service:
    build:
      context: .
      dockerfile: smart-health-app/Dockerfile
    container_name: smart-health-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_ELASTICSEARCH_USERNAME: elastic
      SPRING_ELASTICSEARCH_PASSWORD: ${ES_PASSWORD:?ES_PASSWORD is required}
      KNOWLEDGE_INITIALIZER_ENABLED: false
      NACOS_SERVER_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AI_API_KEY: ${AI_API_KEY}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      UPLOAD_PATH: /app/uploads
      LOG_FILE: /app/logs/smart-health-app/app.log
    volumes:
      - consultation-uploads:/app/uploads
      - app-logs:/app/logs
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - elasticsearch
      - nacos
    networks:
      - smart-health-net

  frontend:
    build:
      context: .
      dockerfile: smart-health-frontend/Dockerfile
    container_name: smart-health-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - gateway
    networks:
      - smart-health-net

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  es-data:
  prescription-uploads:
  consultation-uploads:
  kibana-token-data:
  app-logs:

networks:
  smart-health-net:
    driver: bridge
