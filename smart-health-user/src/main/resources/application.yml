server:
  port: 8081

spring:
  application:
    name: user-service

  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_health?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# MyBatis
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.smart.health.user.entity
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: ${JWT_SECRET:c21hcnQtaGVhbHRoLXBsYXRmb3JtLWp3dC1zZWNyZXQta2V5LTIwMjY=}
  expiration: 86400000  # 24 hours in ms

# 禁用 common 模块的通用 JWT Filter（user-service 使用自己的 DB-backed Filter）
jwt.auth.filter.enabled: false

# 短信服务配置（mock=本地日志, aliyun=阿里云SMS）
sms:
  provider: ${SMS_PROVIDER:mock}
  aliyun:
    access-key-id: ${SMS_ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ALIYUN_ACCESS_KEY_SECRET:}
    sign-name: ${SMS_ALIYUN_SIGN_NAME:}
    template-code: ${SMS_ALIYUN_TEMPLATE_CODE:}

# Knife4j / SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.smart.health: debug
