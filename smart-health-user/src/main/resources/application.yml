server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: user-service

  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# MyBatis
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.smart.health.user.entity
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: ${JWT_SECRET:?JWT_SECRET is required}
  expiration: 86400000  # 24 hours in ms

# 禁用 common 模块的通用 JWT Filter（user-service 使用自己的 DB-backed Filter）
jwt.auth.filter.enabled: false

# 短信服务配置（mock=本地日志, dypnsapi=阿里云号码认证）
sms:
  provider: ${SMS_PROVIDER:?SMS_PROVIDER must be set (dypnsapi or mock)}
  dypnsapi:
    access-key-id: ${SMS_DYPNSAPI_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_DYPNSAPI_ACCESS_KEY_SECRET:}
    template-code: ${SMS_DYPNSAPI_TEMPLATE_CODE:}
    endpoint: ${SMS_DYPNSAPI_ENDPOINT:dypnsapi.aliyuncs.com}
    sign-name: ${SMS_DYPNSAPI_SIGN_NAME:}

  # Mail (SMTP)
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# 邮箱服务配置（mock=本地日志, smtp=SMTP邮件发送）
email:
  provider: ${EMAIL_PROVIDER:mock}

# Knife4j / SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.smart.health: debug
  file:
    name: ${LOG_FILE:}
