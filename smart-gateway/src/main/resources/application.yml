server:
  port: 9000
  # 增加 URI 长度限制以支持 base64 请求体（默认 8KB）
  netty:
    max-initial-line-length: 16KB

spring:
  application:
    name: gateway-service

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}

    gateway:
      # 使用 Nacos 服务发现进行路由
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # ===== user-service =====
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service-staff
          uri: lb://user-service
          predicates:
            - Path=/api/v1/staff/**

        - id: user-service-admin-patients
          uri: lb://user-service
          predicates:
            - Path=/api/v1/admin/patients/**

        - id: app-service-dashboard
          uri: lb://smart-health-platform
          predicates:
            - Path=/api/v1/dashboard/**

        # ===== consultation-service (SPECIFIC ROUTES BEFORE GENERIC) =====
        - id: consultation-service-doctor
          uri: lb://consultation-service
          predicates:
            - Path=/api/v1/doctor/consultations/**

        # ===== registration-service =====
        - id: registration-service-schedule
          uri: lb://registration-service
          predicates:
            - Path=/api/v1/schedule/**

        - id: registration-service-registration
          uri: lb://registration-service
          predicates:
            - Path=/api/v1/registration/**

        - id: registration-service-dept
          uri: lb://registration-service
          predicates:
            - Path=/api/v1/dept/**

        - id: registration-service-doctor
          uri: lb://registration-service
          predicates:
            - Path=/api/v1/doctor/**

        # ===== consultation-service =====
        - id: consultation-service-ai
          uri: lb://consultation-service
          predicates:
            - Path=/api/v1/ai/**

        - id: consultation-service-files
          uri: lb://consultation-service
          predicates:
            - Path=/api/v1/files/**

        # ===== prescription-service =====
        - id: prescription-service-issue
          uri: lb://prescription-service
          predicates:
            - Path=/api/v1/prescription/**

        - id: prescription-service-prescriptions
          uri: lb://prescription-service
          predicates:
            - Path=/api/v1/prescriptions/**

        - id: prescription-service-pharmacy
          uri: lb://prescription-service
          predicates:
            - Path=/api/v1/pharmacy/**

        - id: prescription-service-inventory
          uri: lb://prescription-service
          predicates:
            - Path=/api/v1/inventory/**

        - id: prescription-service-medicine
          uri: lb://prescription-service
          predicates:
            - Path=/api/v1/medicine/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# JWT (与 user-service 共享同一密钥)
jwt:
  secret: ${JWT_SECRET:?JWT_SECRET is required}

logging:
  level:
    com.smart.health.gateway: debug
    org.springframework.cloud.gateway: debug
