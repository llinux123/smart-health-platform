server:
  port: 8080

spring:
  application:
    name: smart-health-platform

  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_health?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  # Elasticsearch
  elasticsearch:
    uris: http://localhost:9200

  # Spring AI - OpenAI Compatible API
  ai:
    openai:
      base-url: https://${WorkspaceId:ws-9n3g02zvmmjc0ukc}.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_API_KEY:sk-ws-H.RXMPYDE.6E1X.MEQCIGjtAs6vhh7IX5srIjIEhavW9jgAlHoxB7KlvHHtncH4AiAyrYYEpj4dv2aSKFkuwN3kayGPwZL_a47fSAiOpgdd5g}
      chat:
        options:
          model: qwen3.7-max
      embedding:
        options:
          model: text-embedding-ada-002

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# MyBatis
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.smart.health.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# Knife4j / SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT
jwt:
  secret: ${JWT_SECRET:c21hcnQtaGVhbHRoLXBsYXRmb3JtLWp3dC1zZWNyZXQta2V5LTIwMjY=}
  expiration: 86400000  # 24 hours in ms

# File upload
file:
  upload-path: ${UPLOAD_PATH:/tmp/smart-health/uploads/}

logging:
  level:
    com.smart.health: debug
    org.springframework.ai: debug
