server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: smart-health-platform

  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_health?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}

  # Nacos 服务发现
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
    virtual-host: /

  # Elasticsearch
  elasticsearch:
    uris: http://localhost:9200

  # Spring AI - OpenAI Compatible API
  ai:
    openai:
      base-url: https://${WorkspaceId:ws-9n3g02zvmmjc0ukc}.cn-beijing.maas.aliyuncs.com/compatible-mode
      api-key: ${AI_API_KEY:default}
      chat:
        options:
          model: qwen3.7-max
      embedding:
        options:
          model: text-embedding-v3

  # Zhipu AI - multimodal vision model
  ai-zhipu:
    base-url: https://open.bigmodel.cn/api/paas/v4
    api-key: ${ZHIPU_API_KEY:your-zhipu-api-key-here}
    model: glm-4v-flash

  # File upload limits
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# MyBatis
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.smart.health.*.entity
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# Knife4j / SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT
jwt:
  secret: ${JWT_SECRET:?JWT_SECRET is required}
  expiration: 86400000  # 24 hours in ms
  # 聚合模块使用 user-service 的 DB-backed SecurityConfig，禁用通用 JwtAutoSecurityConfig
  auth:
    filter:
      enabled: false

# File upload
file:
  upload-path: ${UPLOAD_PATH:/tmp/smart-health/uploads/}

# Knowledge base seed data
knowledge:
  seed:
    enabled: true
    location: classpath:knowledge/medical-knowledge-seed.json

logging:
  level:
    com.smart.health: debug
    org.springframework.ai: debug
